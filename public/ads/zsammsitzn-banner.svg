<svg width="728" height="90" viewBox="0 0 728 90" xmlns="http://www.w3.org/2000/svg">
  <!-- Warm vintage background -->
  <defs>
    <linearGradient id="vintage-bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2d1810;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3d2415;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="728" height="90" fill="url(#vintage-bg)" rx="8"/>
  
  <!-- Border -->
  <rect width="728" height="90" fill="none" stroke="#5a3825" stroke-width="1" rx="8"/>
  
  <!-- Vintage wine glass icon -->
  <g transform="translate(50, 35)">
    <path d="M 15 5 L 25 5 L 22 20 L 18 20 Z" fill="#d4a574" opacity="0.8"/>
    <rect x="17" y="20" width="6" height="8" fill="#d4a574" opacity="0.8"/>
    <ellipse cx="20" cy="30" rx="8" ry="2" fill="#d4a574" opacity="0.8"/>
  </g>
  
  <!-- Text -->
  <text x="100" y="38" font-family="Georgia, serif" font-size="13" fill="#d4a574" font-weight="400" font-style="italic">
    Präsentiert von
  </text>
  <text x="100" y="60" font-family="Georgia, serif" font-size="22" fill="#f5e6d3" font-weight="600">
    Zsammsitzn.com
  </text>
  
  <!-- Subtle ornament -->
  <circle cx="670" cy="45" r="3" fill="#d4a574" opacity="0.4"/>
  <circle cx="680" cy="45" r="3" fill="#d4a574" opacity="0.4"/>
  <circle cx="690" cy="45" r="3" fill="#d4a574" opacity="0.4"/>
